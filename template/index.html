<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philippine Peso Bill Detector</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>New 50/20 Peso Bill Detector</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab(0)">Image Detection</button>
            <button class="tab-btn" onclick="showTab(1)">Video Processing</button>
            <button class="tab-btn" onclick="showTab(2)">Live Webcam</button>
        </div>

        <!-- Image Tab -->
        <div id="tab0" class="tab-content">
            <input type="file" id="imageInput" accept="image/*" multiple>
            <button onclick="uploadImages()">Detect Bills</button>
            
            <div id="previewArea" class="preview-container"></div>

            <div id="imageResult" class="result"></div>
        </div>

        <!-- Video & Webcam tabs remain the same -->
        <div id="tab1" class="tab-content" style="display: none;">
            <input type="file" id="videoInput" accept="video/*">
            <button onclick="uploadVideo()">Process Video</button>
            <div id="videoResult" class="result"></div>
        </div>

        <div id="tab2" class="tab-content" style="display: none;">
            <div class="stream-container">
                <img id="webcamStream" src="" alt="Live Detection">
            </div>
            <p><strong>Live Detection Active</strong> • Only 50 & 20 Peso bills will be highlighted</p>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
